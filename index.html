<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Who Was There — Football Trivia</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#080c12;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
  #app{width:100%;max-width:680px;min-height:100vh;background:#0d1117;display:flex;flex-direction:column}
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2.5rem 1.5rem}
  .screen.active{display:flex}

  /* ── Setup ── */
  .title{font-size:2.4rem;font-weight:800;letter-spacing:3px;color:#58a6ff;text-transform:uppercase;text-align:center;margin-bottom:.3rem}
  .subtitle{font-size:.75rem;color:#8b949e;letter-spacing:4px;text-transform:uppercase;margin-bottom:2.5rem}
  .form-group{width:100%;max-width:380px;margin-bottom:1.25rem}
  .form-group label{display:block;font-size:.72rem;color:#8b949e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.4rem}
  .form-group input,.form-group select{
    width:100%;background:#161b22;border:1px solid #30363d;color:#e6edf3;
    padding:.75rem 1rem;border-radius:8px;font-size:1rem;outline:none;font-family:inherit
  }
  .form-group input:focus,.form-group select:focus{border-color:#58a6ff}
  .form-group select option{background:#161b22}

  /* Points-to-win pill selector */
  .pts-group{width:100%;max-width:380px;margin-bottom:1.25rem}
  .pts-group label{display:block;font-size:.72rem;color:#8b949e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.6rem}
  .pts-pills{display:flex;gap:.6rem}
  .pts-pill{
    flex:1;padding:.65rem 0;border-radius:8px;border:1px solid #30363d;
    background:#161b22;color:#8b949e;font-size:1rem;font-weight:700;
    cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;letter-spacing:1px
  }
  .pts-pill.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
  .pts-pill:hover:not(.active){border-color:#58a6ff;color:#58a6ff}

  /* ── Game Format Selector ── */
  .fmt-group{width:100%;max-width:380px;margin-bottom:1.25rem}
  .fmt-group label{display:block;font-size:.72rem;color:#8b949e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.6rem}
  .fmt-pills{display:flex;gap:.6rem;flex-direction:column}
  .fmt-pill{
    width:100%;padding:.7rem 1rem;border-radius:8px;border:1px solid #30363d;
    background:#161b22;color:#8b949e;font-size:.82rem;font-weight:700;
    cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;letter-spacing:.5px;
    display:flex;align-items:center;gap:.75rem
  }
  .fmt-pill .fmt-icon{font-size:1.1rem;flex-shrink:0}
  .fmt-pill .fmt-text{display:flex;flex-direction:column;gap:.15rem}
  .fmt-pill .fmt-name{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
  .fmt-pill .fmt-desc{font-size:.68rem;color:#8b949e;font-weight:400;text-transform:none;letter-spacing:.3px}
  .fmt-pill.active{background:#1a2940;border-color:#1f6feb;color:#58a6ff}
  .fmt-pill.active .fmt-desc{color:#79b8ff}
  .fmt-pill:hover:not(.active){border-color:#58a6ff;color:#c9d1d9}

  .btn-start{
    width:100%;max-width:380px;margin-top:.75rem;padding:.85rem;border-radius:8px;
    background:#58a6ff;color:#0d1117;font-size:1rem;font-weight:700;cursor:pointer;
    border:none;letter-spacing:1.5px;text-transform:uppercase;transition:background .15s
  }
  .btn-start:hover{background:#79b8ff}
  .btn-start:active{transform:scale(.98)}

  /* ── Countdown Screen ── */
  #countdown-screen{background:#0d1117}
  .countdown-number{
    font-size:12rem;font-weight:900;color:#58a6ff;
    line-height:1;letter-spacing:-4px;
    text-shadow:0 0 60px rgba(88,166,255,.4);
    animation:cdPop .35s cubic-bezier(.22,1,.36,1);
    transition:color .2s
  }
  .countdown-number.go{
    color:#3fb950;
    text-shadow:0 0 60px rgba(63,185,80,.4);
    font-size:9rem;letter-spacing:2px
  }
  @keyframes cdPop{
    0%  {transform:scale(.5);opacity:0}
    60% {transform:scale(1.08)}
    100%{transform:scale(1);opacity:1}
  }

  /* ── Game header ── */
  .game-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:.85rem 1.5rem;background:#161b22;border-bottom:1px solid #21262d;
    width:100%
  }
  .target-info{font-size:.65rem;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .target-val{font-size:.95rem;font-weight:700;color:#e6edf3}
  .scores{display:flex;gap:1.75rem;align-items:center}
  .score-block{text-align:center}
  .score-name{font-size:.65rem;color:#8b949e;letter-spacing:1px;text-transform:uppercase;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
  .score-val{font-size:1.8rem;font-weight:800;color:#58a6ff;line-height:1}
  .score-pips{display:flex;gap:3px;justify-content:center;margin-top:4px;min-height:8px}
  .pip{width:7px;height:7px;border-radius:50%;background:#1f6feb}
  .pip.empty{background:#21262d}

  /* ── Round type badge ── */
  .round-type-bar{
    width:100%;padding:.45rem 1.5rem;background:#0d1117;border-bottom:1px solid #21262d;
    display:flex;align-items:center;gap:.5rem
  }
  .round-badge{
    font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    padding:.2rem .6rem;border-radius:4px
  }
  .round-badge.mode-tt{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb55}
  .round-badge.mode-tc{background:#2d1f6f22;color:#b08fff;border:1px solid #7c3aed55}
  .round-badge-label{font-size:.62rem;color:#8b949e;letter-spacing:1px}

  /* ── Timer ring ── */
  .timer-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1rem 1rem .3rem;width:100%;gap:.4rem}
  .timer-ring-container{position:relative;width:68px;height:68px}
  .timer-svg{transform:rotate(-90deg);width:68px;height:68px}
  .timer-track{fill:none;stroke:#21262d;stroke-width:5}
  .timer-arc{
    fill:none;stroke:#58a6ff;stroke-width:5;stroke-linecap:round;
    stroke-dasharray:188.5;stroke-dashoffset:0;
    transition:stroke .4s,stroke-dashoffset .05s linear
  }
  .timer-arc.warn{stroke:#e3b341}
  .timer-arc.danger{stroke:#f85149}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#e6edf3;letter-spacing:-1px}
  .timer-num.warn{color:#e3b341}
  .timer-num.danger{color:#f85149}
  .timeout-msg{display:none;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f85149;text-align:center}

  /* ── Logos area ── */
  .logos-area{display:flex;justify-content:center;align-items:center;gap:1.5rem;padding:1rem 1rem .75rem;flex-wrap:wrap;width:100%}
  .team-card{display:flex;flex-direction:column;align-items:center;gap:.85rem;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:1.5rem 1.25rem;flex:1;min-width:140px;max-width:200px}
  .team-card.country-card{border-color:#7c3aed44;background:#1a1528}
  .team-name{font-size:.78rem;font-weight:600;color:#c9d1d9;text-transform:uppercase;letter-spacing:.8px;text-align:center}
  .team-name.country-label{color:#b08fff}
  .team-img{width:120px;height:120px;object-fit:contain}
  /* Country flags are wider, override size */
  .team-img.flag-img{width:140px;height:94px;object-fit:cover;border-radius:6px;box-shadow:0 2px 12px #0006}
  .vs-badge{font-size:1.6rem;font-weight:800;color:#30363d;flex-shrink:0}

  /* ── Answer buttons ── */
  .answer-prompt{font-size:.78rem;color:#8b949e;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;text-align:center;padding:0 1rem}
  .btn-row{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;padding:0 1rem 1.75rem;width:100%}
  .btn-p1,.btn-p2,.btn-pass{flex:1;min-width:130px;max-width:190px;padding:.75rem .75rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;font-family:inherit}
  .btn-p1{background:#1f6feb;color:#fff}
  .btn-p1:hover{background:#388bfd}
  .btn-p2{background:transparent;color:#58a6ff;border:1.5px solid #1f6feb}
  .btn-p2:hover{background:#1f6feb22}
  .btn-pass{background:#21262d;color:#8b949e;border:1px solid #30363d}
  .btn-pass:hover{background:#30363d;color:#c9d1d9}
  .btn-p1:active,.btn-p2:active,.btn-pass:active{transform:scale(.97)}
  .btn-p1:disabled,.btn-p2:disabled{opacity:.3;cursor:not-allowed;transform:none}

  /* ── End screen ── */
  #end-screen{text-align:center}
  .trophy{font-size:4.5rem;margin-bottom:1rem}
  .winner-label{font-size:.72rem;color:#8b949e;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:.4rem}
  .winner-name{font-size:2.8rem;font-weight:800;color:#e3b341;margin-bottom:.4rem;letter-spacing:1px}
  .winner-result{font-size:1rem;color:#8b949e;margin-bottom:2rem}
  .scoreboard{display:flex;gap:1.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
  .sb-block{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:1rem 1.75rem;text-align:center;min-width:100px}
  .sb-name{font-size:.68rem;color:#8b949e;letter-spacing:1px;text-transform:uppercase;margin-bottom:.25rem}
  .sb-score{font-size:2.4rem;font-weight:800;color:#58a6ff}
  .btn-again{padding:.85rem 3rem;border-radius:8px;background:#58a6ff;color:#0d1117;font-size:1rem;font-weight:700;cursor:pointer;border:none;letter-spacing:1.5px;text-transform:uppercase;transition:background .15s;font-family:inherit}
  .btn-again:hover{background:#79b8ff}

  @media(max-width:480px){
    .title{font-size:1.8rem}
    .team-img{width:90px;height:90px}
    .team-img.flag-img{width:110px;height:74px}
    .logos-area{gap:1rem;padding:.75rem .5rem .5rem}
    .team-card{min-width:120px;padding:1rem .75rem}
    .btn-p1,.btn-p2,.btn-pass{min-width:100px;font-size:.75rem}
    .winner-name{font-size:2rem}
    .timer-ring-container,.timer-svg{width:58px;height:58px}
    .timer-num{font-size:1.2rem}
    .countdown-number{font-size:8rem}
    .countdown-number.go{font-size:6rem}
    .fmt-pill .fmt-name{font-size:.75rem}
    .fmt-pill .fmt-desc{font-size:.65rem}
  }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div id="setup-screen" class="screen active">
    <div class="title">Who Was There</div>
    <div class="subtitle">Football Trivia for Two</div>
    <div class="form-group">
      <label>Player 1 Name</label>
      <input type="text" id="p1name" placeholder="e.g. Marco" maxlength="20"/>
    </div>
    <div class="form-group">
      <label>Player 2 Name</label>
      <input type="text" id="p2name" placeholder="e.g. Sofia" maxlength="20"/>
    </div>
    <div class="pts-group">
      <label>First to score</label>
      <div class="pts-pills">
        <button class="pts-pill active" data-pts="3" onclick="selectPts(3)">3 pts</button>
        <button class="pts-pill"        data-pts="5" onclick="selectPts(5)">5 pts</button>
      </div>
    </div>

    <!-- NEW: Game Format selector -->
    <div class="fmt-group">
      <label>Game Format</label>
      <div class="fmt-pills">
        <button class="fmt-pill active" data-fmt="tt" onclick="selectFormat('tt')">
          <span class="fmt-icon">⚽</span>
          <span class="fmt-text">
            <span class="fmt-name">Team vs Team</span>
            <span class="fmt-desc">Two club logos — who played for both?</span>
          </span>
        </button>
        <button class="fmt-pill" data-fmt="tc" onclick="selectFormat('tc')">
          <span class="fmt-icon">🌍</span>
          <span class="fmt-text">
            <span class="fmt-name">Team vs Country</span>
            <span class="fmt-desc">One club logo + one country flag — who played for both?</span>
          </span>
        </button>
        <button class="fmt-pill" data-fmt="mix" onclick="selectFormat('mix')">
          <span class="fmt-icon">🔀</span>
          <span class="fmt-text">
            <span class="fmt-name">Mixed</span>
            <span class="fmt-desc">Alternates between Team–Team and Team–Country rounds</span>
          </span>
        </button>
      </div>
    </div>

    <button class="btn-start" onclick="startGame()">Start Game</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown-screen" class="screen">
    <div class="countdown-number" id="countdown-number">3</div>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen" style="padding:0;justify-content:flex-start">
    <div class="game-header">
      <div>
        <div class="target-info">First to</div>
        <div class="target-val" id="hdr-target">3 points</div>
      </div>
      <div class="scores">
        <div class="score-block">
          <div class="score-name" id="s-p1name">P1</div>
          <div class="score-val"  id="s-p1score">0</div>
          <div class="score-pips" id="pips-p1"></div>
        </div>
        <div class="score-block">
          <div class="score-name" id="s-p2name">P2</div>
          <div class="score-val"  id="s-p2score">0</div>
          <div class="score-pips" id="pips-p2"></div>
        </div>
      </div>
    </div>

    <!-- Round type indicator (visible in mixed mode, always shown for clarity) -->
    <div class="round-type-bar" id="round-type-bar">
      <span class="round-badge mode-tt" id="round-badge">Team vs Team</span>
      <span class="round-badge-label" id="round-badge-label"></span>
    </div>

    <div class="timer-wrap">
      <div class="timer-ring-container">
        <svg class="timer-svg" viewBox="0 0 68 68">
          <circle class="timer-track" cx="34" cy="34" r="30"/>
          <circle class="timer-arc" id="timer-arc" cx="34" cy="34" r="30"/>
        </svg>
        <div class="timer-num" id="timer-num">10</div>
      </div>
      <div class="timeout-msg" id="timeout-msg">⏱ Time's up — press pass</div>
    </div>

    <div class="logos-area" id="logos-area">
      <!-- Populated dynamically -->
    </div>

    <div class="answer-prompt" id="answer-prompt">Who had a player at BOTH clubs?</div>
    <div class="btn-row">
      <button class="btn-p1" id="btn-p1" onclick="award(1)">Player 1</button>
      <button class="btn-pass" id="btn-pass" onclick="award(0)">Pass / No Match</button>
      <button class="btn-p2" id="btn-p2" onclick="award(2)">Player 2</button>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen" class="screen">
    <div class="trophy">🏆</div>
    <div class="winner-label">Winner</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-result" id="winner-result"></div>
    <div class="scoreboard">
      <div class="sb-block">
        <div class="sb-name" id="end-p1name">P1</div>
        <div class="sb-score" id="end-p1score">0</div>
      </div>
      <div class="sb-block">
        <div class="sb-name" id="end-p2name">P2</div>
        <div class="sb-score" id="end-p2score">0</div>
      </div>
    </div>
    <button class="btn-again" onclick="resetGame()">Play Again</button>
  </div>

</div>
<script>
/* ═══════════════════════════════════════════════════════
   TEAM CATALOGUE  (unchanged from original)
═══════════════════════════════════════════════════════ */
const ELITE = [
  'arsenal','chelsea','liverpool','manchester-city','manchester-united',
  'atletico-madrid','barcelona','real-madrid','sevilla',
  'inter','juventus','lazio','milan','napoli','roma',
  'bayern-munchen','borussia-dortmund','paris-saint-germain'
];
const OTHER = [
  'aston-villa','newcastle','tottenham','west-ham',
  'bayer-leverkusen','rb-leipzig',
  'as-monaco','lille','lyon','marseille',
  'benfica','fc-porto','sporting-cp',
  'ajax','feyenoord','psv',
  'corinthians','flamengo','santos',
  'basaksehir','trabzonspor','al-nassr',
  'antalyaspor','atalanta','basel','boca-juniors',
  'borussia-monchengladbach','bursaspor','cska-moskva','everton',
  'fiorentina','kasimpasa','leicester','real-betis',
  'real-sociedad','river-plate','sivasspor','valencia',
  'villarreal','werder-bremen','wolfsburg','wolves','zenit'
];
const BIG3 = ['besiktas','fenerbahce','galatasaray'];
const ALL  = [...ELITE, ...OTHER, ...BIG3];

/* ── Country catalogue ── */
/* Slugs must match filename pattern: <slug>.country-flags.png  */
const COUNTRIES = [
  'Albania', 'Argentina', 'Austria', 'Belgium', 'Bosnia_and_Herzegovina', 
  'Brazil', 'Cameroon', 'Canada', 'Chile', 'Colombia', 
  'Croatia', 'Czech_Republic', 'Denmark', 'Egypt', 
  'England', 'Finland', 'France', 'Germany', 'Greece', 
  'Hungary', 'Italy', 'Ivory_Coast', 'Japan', 'Mexico', 
  'Morocco', 'Netherlands', 'Nigeria', 'Norway', 'Poland', 
  'Portugal', 'Romania', 'Russia', 'Senegal', 
  'Serbia', 'South_Korea', 'Spain', 'Sweden', 'Switzerland', 
  'Turkey', 'Ukraine', 'Uruguay', 'USA', 'Wales'
];

const ELITE_WEIGHT  = 3;
const TIMER_SEC     = 10;
const CIRCUMFERENCE = 2 * Math.PI * 30; /* r=30 in SVG */

/* ═══════════════════════════════════════════════════════
   HELPERS  (cleanName & imgSrc unchanged)
═══════════════════════════════════════════════════════ */
function cleanName(s){ return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function imgSrc(s)   { return s + '.football-logos.cc.png'; }
function flagSrc(s)  { return s + '.png'; }

/*  Build a weighted pool of teams not yet used this session.  */
function buildPool(usedTeams, excluded=[]) {
  const pool = [];
  ALL.forEach(t => {
    if (usedTeams.has(t))     return;
    if (excluded.includes(t)) return;
    const w = ELITE.includes(t) ? ELITE_WEIGHT : 1;
    for (let i=0; i<w; i++) pool.push(t);
  });
  return pool;
}

function pickFrom(pool){ return pool[Math.floor(Math.random()*pool.length)]; }

/*  Draw one fresh pair (team–team).  Unchanged original logic.  */
function drawPair(usedTeams, forceBig3=false) {
  let t1, t2;

  if (forceBig3) {
    const avail = BIG3.filter(t => !usedTeams.has(t));
    if (avail.length === 0) {
      forceBig3 = false;
    } else {
      t1 = avail[Math.floor(Math.random() * avail.length)];
      const p2 = buildPool(usedTeams, [t1]);
      if (p2.length === 0) return null;
      t2 = pickFrom(p2);
      if (Math.random() < .5) [t1,t2]=[t2,t1];
      return {t1,t2};
    }
  }

  const p1 = buildPool(usedTeams);
  if (p1.length < 2) return null;
  t1 = pickFrom(p1);
  const p2 = buildPool(usedTeams, [t1]);
  if (p2.length === 0) return null;
  t2 = pickFrom(p2);
  return {t1,t2};
}

/*  Draw one team + one unused country for a team–country round.  */
function drawTeamCountry(usedTeams, usedCountries, forceBig3=false) {
  /* Pick team using same BIG3 logic */
  let team;
  if (forceBig3) {
    const avail = BIG3.filter(t => !usedTeams.has(t));
    if (avail.length > 0) {
      team = avail[Math.floor(Math.random() * avail.length)];
    }
  }
  if (!team) {
    const pool = buildPool(usedTeams);
    if (pool.length === 0) return null;
    team = pickFrom(pool);
  }

  /* Pick unused country */
  const cPool = COUNTRIES.filter(c => !usedCountries.has(c));
  if (cPool.length === 0) {
    /* All countries used — reset country pool */
    usedCountries.clear();
    cPool.push(...COUNTRIES);
  }
  const country = cPool[Math.floor(Math.random() * cPool.length)];

  /* Randomise left/right */
  if (Math.random() < .5) return { team, country, teamLeft: true };
  return { team, country, teamLeft: false };
}

/* ═══════════════════════════════════════════════════════
   STATE & SETUP UI
═══════════════════════════════════════════════════════ */
let state          = {};
let timerInterval  = null;
let selectedPts    = 3;
let selectedFormat = 'tt';  /* 'tt' | 'tc' | 'mix' */

function selectPts(n) {
  selectedPts = n;
  document.querySelectorAll('.pts-pill').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.pts) === n)
  );
}

function selectFormat(f) {
  selectedFormat = f;
  document.querySelectorAll('.fmt-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.fmt === f)
  );
}

/* ═══════════════════════════════════════════════════════
   TIMER  (unchanged)
═══════════════════════════════════════════════════════ */
function startTimer() {
  clearInterval(timerInterval);
  let rem = TIMER_SEC;
  setTimerDisplay(rem);
  timerInterval = setInterval(()=>{
    rem--;
    setTimerDisplay(rem);
    if (rem <= 0) { clearInterval(timerInterval); onTimeout(); }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function setTimerDisplay(rem) {
  const arc   = document.getElementById('timer-arc');
  const numEl = document.getElementById('timer-num');
  const offset = CIRCUMFERENCE * (1 - rem / TIMER_SEC);
  arc.style.strokeDashoffset = offset;
  numEl.textContent = rem;
  const danger = rem <= 3;
  const warn   = rem <= 5 && !danger;
  arc.className   = 'timer-arc'   + (danger?' danger': warn?' warn':'');
  numEl.className = 'timer-num'   + (danger?' danger': warn?' warn':'');
}

function onTimeout() {
  document.getElementById('btn-p1').disabled = true;
  document.getElementById('btn-p2').disabled = true;
  document.getElementById('timeout-msg').style.display = 'block';
  document.getElementById('btn-pass').textContent = 'Next →';
}

function resetQuestionUI() {
  document.getElementById('btn-p1').disabled = false;
  document.getElementById('btn-p2').disabled = false;
  document.getElementById('timeout-msg').style.display = 'none';
  document.getElementById('btn-pass').textContent = 'Pass / No Match';
  setTimerDisplay(TIMER_SEC);
}

/* ═══════════════════════════════════════════════════════
   SCORE PIPS  (unchanged)
═══════════════════════════════════════════════════════ */
function renderPips(id, score, target) {
  const el = document.getElementById('pips-' + id);
  el.innerHTML = '';
  for (let i=0; i<target; i++) {
    const d = document.createElement('div');
    d.className = 'pip' + (i < score ? '' : ' empty');
    el.appendChild(d);
  }
}

/* ═══════════════════════════════════════════════════════
   PRE-GAME COUNTDOWN  (unchanged)
═══════════════════════════════════════════════════════ */
function runCountdown(callback) {
  showScreen('countdown-screen');
  const el = document.getElementById('countdown-number');
  const steps = ['2','1','GO!'];
  let i = 0;

  function showStep() {
    if (i >= steps.length) { setTimeout(callback, 200); return; }
    const val  = steps[i];
    const isGo = val === 'GO!';
    el.textContent = val;
    el.className = 'countdown-number' + (isGo ? ' go' : '');
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
    i++;
    setTimeout(showStep, isGo ? 800 : 900);
  }

  showStep();
}

/* ═══════════════════════════════════════════════════════
   RENDER LOGOS AREA
═══════════════════════════════════════════════════════ */
function renderTeamTeam(t1, t2) {
  const area = document.getElementById('logos-area');
  area.innerHTML = `
    <div class="team-card">
      <div class="team-name" id="team1name">${cleanName(t1)}</div>
      <img class="team-img" id="team1img" src="${imgSrc(t1)}" alt="${cleanName(t1)}" onerror="this.style.opacity='.3'"/>
    </div>
    <div class="vs-badge">VS</div>
    <div class="team-card">
      <div class="team-name" id="team2name">${cleanName(t2)}</div>
      <img class="team-img" id="team2img" src="${imgSrc(t2)}" alt="${cleanName(t2)}" onerror="this.style.opacity='.3'"/>
    </div>`;
  document.getElementById('answer-prompt').textContent = 'A player at BOTH clubs?';
}

function renderTeamCountry(team, country, teamLeft) {
  const area = document.getElementById('logos-area');
  const teamCard = `
    <div class="team-card">
      <div class="team-name">${cleanName(team)}</div>
      <img class="team-img" src="${imgSrc(team)}" alt="${cleanName(team)}" onerror="this.style.opacity='.3'"/>
    </div>`;
  const countryCard = `
    <div class="team-card country-card">
      <div class="team-name country-label">${cleanName(country)}</div>
      <img class="team-img flag-img" src="${flagSrc(country)}" alt="${cleanName(country)}" onerror="this.style.opacity='.3'"/>
    </div>`;
  area.innerHTML = (teamLeft ? teamCard : countryCard) +
    `<div class="vs-badge">VS</div>` +
    (teamLeft ? countryCard : teamCard);
  document.getElementById('answer-prompt').textContent = 'Who played for this club AND represented this country?';
}

/* Update the round-type badge */
function setRoundBadge(isTc) {
  const badge = document.getElementById('round-badge');
  const label = document.getElementById('round-badge-label');
  if (isTc) {
    badge.textContent = 'Team vs Country';
    badge.className   = 'round-badge mode-tc';
  } else {
    badge.textContent = 'Team vs Team';
    badge.className   = 'round-badge mode-tt';
  }
  /* Show extra hint only in mixed mode */
  label.textContent = selectedFormat === 'mix' ? (isTc ? '🌍 Country round' : '⚽ Club round') : '';
}

/* ═══════════════════════════════════════════════════════
   GAME FLOW
═══════════════════════════════════════════════════════ */
function startGame() {
  const p1     = document.getElementById('p1name').value.trim() || 'Player 1';
  const p2     = document.getElementById('p2name').value.trim() || 'Player 2';
  const target = selectedPts;

  state = {
    p1, p2, target,
    score1: 0, score2: 0,
    usedTeams:     new Set(),
    usedCountries: new Set(),
    questionCount: 0,
    big3UsedCount: 0,
    gameFormat: selectedFormat   /* snapshot of chosen format */
  };

  document.getElementById('hdr-target').textContent = target + ' points';
  document.getElementById('s-p1name').textContent   = p1;
  document.getElementById('s-p2name').textContent   = p2;
  document.getElementById('btn-p1').textContent     = p1;
  document.getElementById('btn-p2').textContent     = p2;

  showScreen('setup-screen');
  runCountdown(() => {
    showScreen('game-screen');
    loadQuestion();
  });
}

function loadQuestion() {
  state.questionCount++;

  /* BIG3 cadence: every 3rd question forces a BIG3 team (unchanged) */
  const isBig3Question = (state.questionCount % 3 === 0);
  const big3Available  = BIG3.some(t => !state.usedTeams.has(t));
  const forceBig3      = isBig3Question && big3Available;

  /* Decide round type based on selected game format */
  let isTeamCountryRound;
  if (state.gameFormat === 'tt')  isTeamCountryRound = false;
  else if (state.gameFormat === 'tc') isTeamCountryRound = true;
  else /* mix */ isTeamCountryRound = (state.questionCount % 2 === 0);

  /* Update header scores */
  document.getElementById('s-p1score').textContent = state.score1;
  document.getElementById('s-p2score').textContent = state.score2;
  renderPips('p1', state.score1, state.target);
  renderPips('p2', state.score2, state.target);

  /* Update round badge */
  setRoundBadge(isTeamCountryRound);

  if (isTeamCountryRound) {
    /* ── Team-Country round ── */
    const draw = drawTeamCountry(state.usedTeams, state.usedCountries, forceBig3);
    if (!draw) { endGame(); return; }
    state.usedTeams.add(draw.team);
    state.usedCountries.add(draw.country);
    renderTeamCountry(draw.team, draw.country, draw.teamLeft);
  } else {
    /* ── Team-Team round (original algorithm, untouched) ── */
    const pair = drawPair(state.usedTeams, forceBig3);
    if (!pair) { endGame(); return; }
    const {t1, t2} = pair;
    state.usedTeams.add(t1);
    state.usedTeams.add(t2);
    renderTeamTeam(t1, t2);
  }

  resetQuestionUI();
  startTimer();
}

function award(player) {
  stopTimer();
  if (player === 1) state.score1++;
  if (player === 2) state.score2++;
  if (state.score1 >= state.target || state.score2 >= state.target) {
    endGame(); return;
  }
  loadQuestion();
}

function endGame() {
  stopTimer();
  const p1wins = state.score1 >= state.target || (state.score1 > state.score2);
  const winner = p1wins ? state.p1 : state.p2;

  document.getElementById('winner-name').textContent   = winner;
  document.getElementById('winner-result').textContent =
    state.p1 + '  ' + state.score1 + ' – ' + state.score2 + '  ' + state.p2;
  document.getElementById('end-p1name').textContent  = state.p1;
  document.getElementById('end-p2name').textContent  = state.p2;
  document.getElementById('end-p1score').textContent = state.score1;
  document.getElementById('end-p2score').textContent = state.score2;
  showScreen('end-screen');
}

function resetGame() { stopTimer(); showScreen('setup-screen'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
